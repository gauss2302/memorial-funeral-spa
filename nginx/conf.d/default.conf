# Nginx configuration for ritual-shushenskoe.ru
upstream nuxt-app {
    server nuxt-app:3000;
    keepalive 32;
}

# Redirect non-www to www
server {
    listen 80;
    server_name ritual-shushenskoe.ru;
    return 301 http://www.ritual-shushenskoe.ru$request_uri;
}

# Main server block
server {
    listen 80;
    server_name www.ritual-shushenskoe.ru;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Connection limiting
    limit_conn addr 10;

    # Static assets with caching and rate limiting
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://nuxt-app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Caching
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Rate limiting for static assets
        limit_req zone=general burst=50 nodelay;
    }

    # API routes with strict rate limiting
    location /api/ {
        proxy_pass http://nuxt-app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Strict rate limiting for API
        limit_req zone=api burst=10 nodelay;
    }

    # Contact form with very strict rate limiting
    location ~ ^/(contact|feedback)/?$ {
        proxy_pass http://nuxt-app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Very strict rate limiting for contact forms
        limit_req zone=contact burst=3 nodelay;
    }

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://nuxt-app;
        proxy_set_header Host $host;
        access_log off;
    }

    # Main application with moderate rate limiting
    location / {
        proxy_pass http://nuxt-app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # Moderate rate limiting for general pages
        limit_req zone=general burst=20 nodelay;
    }

    # Block access to sensitive files
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common attack patterns
    location ~* (wp-admin|wp-login|xmlrpc|phpmyadmin) {
        limit_req zone=strict burst=1 nodelay;
        return 444;
    }
}

# HTTPS server block (for future SSL setup)
server {
    listen 443 ssl http2;
    server_name www.ritual-shushenskoe.ru;

    # SSL configuration (will be configured when certificates are available)
    # ssl_certificate /etc/letsencrypt/live/www.ritual-shushenskoe.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/www.ritual-shushenskoe.ru/privkey.pem;

    # For now, return 444 (connection closed) for HTTPS requests
    return 444;
}
